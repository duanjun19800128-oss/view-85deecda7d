<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JYT DB · 企业级业务管理与项目结算中台（脱敏演示）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fbfaf6; --ink:#23211c; --sub:#6b6657;
    --green:#234d36; --green2:#2f6a48; --gold:#b08438; --goldl:#d8c08a; --line:#e2ddd0;
    --red:#b3402e; --amber:#c98a1e; --grass:#3f7d54; --blue:#2f5a78;
    --shadow:0 1px 3px rgba(40,35,20,.08),0 6px 22px rgba(40,35,20,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
  .num{font-variant-numeric:tabular-nums}
  /* 侧边栏 */
  .side{width:236px;flex:none;background:linear-gradient(180deg,#234d36,#1c3f2c);color:#e9e6da;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:0}
  .side .brand{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
  .side .brand .lg{font-size:19px;font-weight:800;letter-spacing:1px}.side .brand .lg b{color:var(--gold)}
  .side .brand .sl{font-size:11px;opacity:.7;margin-top:3px}
  .nav{flex:1;padding:10px 10px;overflow-y:auto}
  .nav .it{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;font-size:13.5px;cursor:pointer;color:#cdd8cf;transition:.12s;margin-bottom:2px}
  .nav .it:hover{background:rgba(255,255,255,.07)}
  .nav .it.on{background:rgba(176,132,56,.22);color:#fff;font-weight:700;box-shadow:inset 3px 0 0 var(--gold)}
  .nav .it .ic{width:18px;text-align:center}
  .side .me{padding:13px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:11.5px;opacity:.8}
  .side .me b{color:var(--goldl)}
  /* 主区 */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{background:var(--panel);border-bottom:1px solid var(--line);padding:11px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
  .top .crumb{font-size:14px;font-weight:700}
  .top .crumb span{color:var(--sub);font-weight:500;font-size:12.5px;margin-left:8px}
  .top .live{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--grass);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,125,84,.5)}70%{box-shadow:0 0 0 7px rgba(63,125,84,0)}100%{box-shadow:0 0 0 0 rgba(63,125,84,0)}}
  .demobar{background:#fbf3e8;border-bottom:1px solid #ecd9bf;color:#9a6a1e;font-size:12px;padding:6px 26px}
  .content{padding:22px 26px 60px;max-width:1280px}
  .view{display:none}.view.on{display:block;animation:fade .3s}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  h2.vt{font-size:19px;font-weight:800;margin-bottom:3px}
  .vd{font-size:13px;color:var(--sub);margin-bottom:16px}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .kpi .lab{font-size:11.5px;color:var(--sub)}
  .kpi .v{font-size:21px;font-weight:800;margin-top:7px}.kpi .v small{font-size:12px;color:var(--sub);font-weight:600}
  .kpi.alert .v{color:var(--red)}.kpi.gold .v{color:var(--gold)}.kpi.green .v{color:var(--green2)}
  /* 卡片/网格 */
  .row{display:grid;gap:14px;margin-bottom:14px}
  .r2{grid-template-columns:1.3fr 1fr}.r2b{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;box-shadow:var(--shadow)}
  .card h3{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h3 .tag{font-size:11px;font-weight:600;color:var(--sub)}
  /* 表格 */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{background:#efeadd;color:#5a5440;font-weight:700;text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-size:12px;white-space:nowrap}
  tbody td{padding:9px 10px;border-bottom:1px solid #ece7da;vertical-align:middle}
  tbody tr:hover{background:#f6f3ea}
  .rt{text-align:right}.ct{text-align:center}
  .pbar{height:6px;background:#ece4d2;border-radius:3px;position:relative;min-width:80px;margin-top:3px}
  .pbar i{position:absolute;left:0;top:0;height:100%;border-radius:3px}.pbar .inv{background:#cdbf9a}.pbar .rec{background:var(--green2)}
  .pill{font-size:11px;padding:2px 9px;border-radius:11px;font-weight:600;white-space:nowrap;display:inline-block}
  .p-run{background:#e7f0e8;color:var(--green2)}.p-fin{background:#e6eef4;color:var(--blue)}.p-warn{background:#fbeede;color:var(--amber)}
  .p-over{background:#fce8e3;color:var(--red)}.p-qa{background:#f0ece0;color:var(--gold)}
  .subj{font-size:10.5px;color:#fff;padding:2px 7px;border-radius:10px}.subj.jyt{background:#3f6b50}.subj.mkq{background:#8a6a2f}
  .rl{width:10px;height:10px;border-radius:50%;display:inline-block}.rl.high{background:var(--red)}.rl.mid{background:var(--amber)}.rl.low{background:var(--grass)}
  .chips{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
  .chip{font-size:12px;padding:5px 13px;border-radius:18px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-weight:600;color:var(--sub)}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  canvas{max-height:230px}
  .warnlist .wn{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
  .warnlist .wn:last-child{border:none}
  .reuse-yes{background:#e2efe5;color:#2b6a44}.reuse-part{background:#f6efd9;color:#9a7b20}.reuse-cus{background:#f6e3dc;color:#a8442e}
  .flowsteps{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .fstep{border-radius:10px;padding:11px;background:#f6f3ea;border-left:3px solid var(--line)}
  .fstep .n{font-size:11px;color:var(--sub)}.fstep .t{font-size:13px;font-weight:700;margin-top:2px}.fstep .s{font-size:11px;margin-top:3px}
  .fleet{display:grid;grid-template-columns:repeat(6,1fr);gap:11px}
  .ag{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 10px;text-align:center;position:relative}
  .ag.on{border-color:var(--green2);background:linear-gradient(180deg,#eef5ef,#fbfaf6)}.ag.off{opacity:.6}
  .ag .ico{font-size:20px}.ag .nm{font-size:12.5px;font-weight:700;margin-top:5px}.ag .st{font-size:10.5px;margin-top:3px;color:var(--sub)}.ag.on .st{color:var(--green2);font-weight:700}
  .ag .bd{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%}.ag.on .bd{background:var(--grass);animation:pulse 1.8s infinite}.ag.off .bd{background:#cfc8b6}
  .det{display:none;background:#faf8f1;border-top:1px dashed var(--line)}
  .det.open{display:table-row}
  .det td{padding:13px 16px}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .calc .cr{display:flex;justify-content:space-between;border-bottom:1px dotted #ddd5c2;padding:3px 0;font-size:12.5px}
  .calc .res{color:var(--red);font-weight:800;border:none;font-size:14px;padding-top:5px}
  .terms{font-size:12px;background:#eef2ea;border-left:3px solid var(--green2);padding:7px 10px;border-radius:0 6px 6px 0;margin-top:8px}
  .why{font-size:12px;background:#f0ece0;border-left:3px solid var(--gold);padding:7px 10px;border-radius:0 7px 7px 0;margin-top:8px}
  .script{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px}
  .script .body{font-size:12.5px;line-height:1.65;white-space:pre-wrap;margin-top:6px}
  .gate{font-size:11px;color:#9a5a3a;background:#fbf0ea;border:1px solid #eccfc2;border-radius:6px;padding:4px 8px;display:inline-block;margin-top:8px}
  .wm{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:.04;background-repeat:repeat}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.r2,.r2b,.r3{grid-template-columns:1fr}.fleet{grid-template-columns:repeat(3,1fr)}.flowsteps{grid-template-columns:repeat(2,1fr)}}
  body{-webkit-user-select:none;-moz-user-select:none;user-select:none}
  img{pointer-events:none}
</style>
</head>
